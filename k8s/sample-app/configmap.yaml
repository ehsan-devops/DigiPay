apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-world-code
  namespace: hello
data:
  app.py: |
    import http.server
    import socketserver
    import time
    from collections import Counter
    from urllib.parse import urlparse

    PORT = 8080
    REQUESTS = Counter()
    LATENCY_SUM = Counter()

    class Handler(http.server.BaseHTTPRequestHandler):
        def _send(self, code, body, content_type="text/plain; charset=utf-8"):
            self.send_response(code)
            self.send_header("Content-Type", content_type)
            self.end_headers()
            self.wfile.write(body.encode("utf-8"))

        def do_GET(self):
            start = time.time()
            path = urlparse(self.path).path
            REQUESTS[path] += 1

            if path == "/":
                self._send(200, "hello-world from Kubernetes\n")
            elif path == "/healthz":
                self._send(200, "ok\n")
            elif path == "/metrics":
                latency = max(time.time() - start, 0.000001)
                LATENCY_SUM[path] += latency
                lines = []
                total = sum(REQUESTS.values())
                lines.append("# HELP http_requests_total Total HTTP requests")
                lines.append("# TYPE http_requests_total counter")
                lines.append(f"http_requests_total {total}")
                for p, count in REQUESTS.items():
                    safe = p.replace('"', '\\"')
                    lines.append(f'http_requests_total_by_path{{path="{safe}"}} {count}')
                lines.append("# HELP http_request_latency_seconds_sum Total handler latency")
                lines.append("# TYPE http_request_latency_seconds_sum counter")
                lines.append(f"http_request_latency_seconds_sum {sum(LATENCY_SUM.values())}")
                lines.append("# HELP http_request_latency_seconds_count Total metrics requests")
                lines.append("# TYPE http_request_latency_seconds_count counter")
                lines.append(f"http_request_latency_seconds_count {REQUESTS.get('/metrics', 0)}")
                self._send(200, "\n".join(lines) + "\n")
                return
            else:
                self._send(404, "not found\n")

            latency = max(time.time() - start, 0.000001)
            LATENCY_SUM[path] += latency

        def log_message(self, fmt, *args):
            return

    with socketserver.TCPServer(("", PORT), Handler) as httpd:
        httpd.serve_forever()
