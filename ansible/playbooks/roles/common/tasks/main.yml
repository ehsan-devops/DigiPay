---
- name: Install base packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - iptables
      - ethtool
      - socat
      - conntrack
      - open-iscsi
    state: present
    update_cache: true

- name: Disable swap immediately
  command: swapoff -a
  changed_when: false
  failed_when: false

- name: Remove swap from fstab
  mount:
    name: swap
    fstype: swap
    state: absent

- name: Load kernel modules for Kubernetes
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Ensure kernel modules are loaded
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter
  failed_when: false

- name: Configure sysctl for Kubernetes networking
  copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    content: |
      net.bridge.bridge-nf-call-iptables=1
      net.bridge.bridge-nf-call-ip6tables=1
      net.ipv4.ip_forward=1

- name: Apply sysctl settings
  command: sysctl --system
  changed_when: false

- name: Ensure /etc/hosts contains cluster nodes
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED K8S HOSTS"
    block: |
      192.168.56.10 ansible
      192.168.56.20 lb
      192.168.56.21 cp1
      192.168.56.22 cp2
      192.168.56.23 cp3
      192.168.56.31 worker1
      192.168.56.32 worker2
